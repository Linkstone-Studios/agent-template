services:
  hermes-agent:
    build: .
    volumes:
      - .:/root/.hermes
    env_file:
      - .env
    environment:
      - HERMES_HOME=/root/.hermes
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-WeGZMzBc1iuOXSfGx1XdQIe6Wkm+Nzk9hUmbo+DTRhQ=}
      - GATEWAY_ALLOW_ALL_USERS=true
    ports:
      - "8642:8642" # OpenAI-compatible API
      - "8000:8000" # Gateway/Web UI port (optional)
    restart: always

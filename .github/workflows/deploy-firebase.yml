name: Deploy Flutter Web to Firebase Hosting

on:
  # Trigger on pushes to main branch
  push:
    branches:
      - main
    paths:
      - 'flutter/**'
      - '.github/workflows/deploy-firebase.yml'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Install Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Build Flutter web app with environment variables
        working-directory: flutter
        run: |
          flutter build web --release \
            --pwa-strategy=none \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRAXISOS_1 }}'
          channelId: live
          projectId: praxisos-1


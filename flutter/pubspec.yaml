name: agent_template
description: "A Flutter project with AI agent integration."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.3
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  flutter_dotenv: ^6.0.0
  logging: ^1.3.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.7
  go_router: ^14.8.1
  uuid: ^4.5.1
  image_picker: ^1.2.1
  file_picker: ^8.1.6
  http: ^1.2.2
  shadcn_flutter: ^0.0.52
  flutter_markdown_plus: ^1.0.7
  shimmer: ^3.0.0
  intl: ^0.20.2
  firebase_core: ^4.7.0
  firebase_analytics: ^12.2.0
  firebase_remote_config: ^6.1.1
  firebase_app_check: ^0.4.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^3.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSans-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/NotoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSans-SemiBoldItalic.ttf
          weight: 600
          style: italic